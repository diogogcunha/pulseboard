# WHY THIS WORKFLOW EXISTS: Enforces the quality gate on every PR.
# Runs lint, type-check, tests, and coverage threshold.
# This is the workflow referenced in branch protection rules.

name: quality

on:
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pulseboard
          POSTGRES_PASSWORD: pulseboard
          POSTGRES_DB: pulseboard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Lint
        run: cd api && npm run lint

      - name: Type check
        run: cd api && npm run typecheck

      - name: Unit tests with coverage
        run: cd api && npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: pulseboard
          DB_PASS: pulseboard
          DB_NAME: pulseboard_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          MAGIC_LINK_SECRET: test-magic-link-secret

      - name: Frontend type check
        run: cd web && npm ci && npm run typecheck
