# WHY THIS WORKFLOW EXISTS: Automatically creates a feature branch when an issue
# is assigned. This is the "automated SDLC cascade" participants experience.
# Branch name follows the convention: feat/[module-label]/[number]-[slug]

name: issue-to-branch

on:
  issues:
    types: [assigned]

permissions:
  contents: write
  issues: write

jobs:
  create-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract module from labels
        id: module
        run: |
          LABELS='${{ toJSON(github.event.issue.labels) }}'
          MODULE=$(echo $LABELS | jq -r '.[] | select(.name | startswith("module:")) | .name' | head -1 | sed 's/module://')
          if [ -z "$MODULE" ]; then
            MODULE="common"
          fi
          echo "module=$MODULE" >> $GITHUB_OUTPUT

      - name: Slugify issue title
        id: slug
        run: |
          TITLE="${{ github.event.issue.title }}"
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Create branch
        run: |
          BRANCH="feat/${{ steps.module.outputs.module }}/${{ github.event.issue.number }}-${{ steps.slug.outputs.slug }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🌿 Branch \`${process.env.BRANCH}\` created from \`main\`.\n\nSwitch to it: \`git fetch && git checkout ${process.env.BRANCH}\``
            })
