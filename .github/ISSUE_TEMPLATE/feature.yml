name: Feature
description: A new feature implementation
title: "[feat] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for new feature issues. Reference 03_GITHUB_ISSUES.md for examples.
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module does this feature belong to?
      options:
        - users-auth
        - pulses
        - insights
        - notifications
        - common
        - public
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this feature do?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this issue to be closed?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
